<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoops Analytics MVP - 戰術影片連動驗證</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --court-line: #334155;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .container {
            display: flex;
            width: 1200px;
            max-width: 95vw;
            gap: 30px;
            background: #141b2d;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-box {
            flex: 1.2;
            position: relative;
            padding-bottom: 33.75%;
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .analysis-box {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .court {
            width: 100%;
            aspect-ratio: 15 / 14;
            border: 2px solid var(--court-line);
            border-top: none;
            position: relative;
            background-color: #0f172a;
            border-radius: 4px;
            overflow: hidden;
        }

        .court::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 33.3%; height: 41.4%;
            border: 2px solid var(--court-line);
        }

        .three-point-line {
            position: absolute;
            top: -50%; left: 50%;
            transform: translateX(-50%);
            width: 90%; height: 135%;
            border: 2px solid var(--court-line);
            border-radius: 50%;
        }

        .shot-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: rgba(56, 189, 248, 0.4);
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            z-index: 10;
        }

        .shot-dot:hover {
            background-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            scale: 1.3;
        }

        .shot-dot.active {
            background-color: #f43f5e;
            border-color: #fda4af;
            box-shadow: 0 0 15px #f43f5e;
        }

        .play-info {
            background: #1e293b;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>HOOPS INFOGRAPHIC MVP (VIDEO X DATA LINK)</h1>

    <div class="container">
        <div class="video-box">
            <div id="player"></div>
        </div>

        <div class="analysis-box">
            <div class="court">
                <div class="three-point-line"></div>
                <div id="shot-map-container"></div>
            </div>
            
            <div class="play-info" id="info-display">
                💡 點擊球場上的<strong>藍色投籃點</strong>，影片會即時跳轉至該 Play 出手前 5 秒。
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // ==========================================
        // 🔧 這裡修改你的 YouTube 影片 ID
        // ==========================================
        // 例如網址是 https://www.youtube.com/watch?v=abc123XYZ，你就填入 'abc123XYZ'
        const YOUR_YOUTUBE_VIDEO_ID = 'dQw4w9WgXcQ'; 

        // ==========================================
        // 📊 這裡修改你的 10 個 Play 數據
        // ==========================================
        // time: 跳轉的秒數 (例: 1分15秒出手 -> 想在1分10秒開始播 -> 填 70 秒)
        // x: 球場左右位置 (0是最左邊，50是正中間頂弧，100是最右邊)
        // y: 離中線向下延伸的位置 (0是半場中線，100是籃筐底線)
        const shotData = [
            { id: 1,  time: 45,   x: 25, y: 30, desc: "Play 1 - 控衛左側 45 度 Crossover 突破分球，底角三分命中。" },
            { id: 2,  time: 134,  x: 50, y: 45, desc: "Play 2 - 頂弧擋拆（Pick & Roll）後，中鋒高位跳投得分。" },
            { id: 3,  time: 320,  x: 80, y: 20, desc: "Play 3 - 快攻導傳，右側 45 度角追身三分波。" },
            { id: 4,  time: 512,  x: 50, y: 85, desc: "Play 4 - 籃下強攻，兩分 Baseline 轉身 Fadeaway 擦板。" },
            { id: 5,  time: 745,  x: 15, y: 80, desc: "Play 5 - 左側底角戰術走位，跑出空位三分空心入波。" },
            { id: 6,  time: 910,  x: 75, y: 50, desc: "Play 6 - 右側 45 度 ISO 單打，急停中距離跳投。" },
            { id: 7,  time: 1105, x: 35, y: 40, desc: "Play 7 - 經過 3 次精準傳導，罰球線頂端接球即射。" },
            { id: 8,  time: 1350, x: 52, y: 75, desc: "Play 8 - 衝搶進攻籃板，籃下二次進攻補籃得分。" },
            { id: 9,  time: 1580, x: 85, y: 85, desc: "Play 9 - 右側底線突破，Low Post 小拋投。" },
            { id: 10, time: 1845, x: 50, y: 25, desc: "Play 10 - 讀秒階段 Logo Shot 壓哨三分球！" }
        ];

        let player;
        const infoDisplay = document.getElementById('info-display');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: YOUR_YOUTUBE_VIDEO_ID,
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            console.log("YouTube Player Ready.");
            renderShotMap();
        }

        function renderShotMap() {
            const container = document.getElementById('shot-map-container');
            
            shotData.forEach(shot => {
                const dot = document.createElement('div');
                dot.className = 'shot-dot';
                dot.style.left = `${shot.x}%`;
                dot.style.top = `${shot.y}%`;
                dot.setAttribute('title', `Play ${shot.id}`);

                dot.addEventListener('click', () => {
                    document.querySelectorAll('.shot-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');

                    const seekTime = Math.max(0, shot.time);
                    
                    player.seekTo(seekTime, true);
                    player.playVideo();

                    infoDisplay.innerHTML = `<strong>正在播放 Play ${shot.id}：</strong><br>${shot.desc}`;
                });

                container.appendChild(dot);
            });
        }
    </script>
</body>
</html>
