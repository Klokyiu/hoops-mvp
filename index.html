<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoops Analytics MVP - NCAA 戰術流派分析</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --court-line: #334155;
            --text-color: #f8fafc;
            --panel-bg: #141b2d;
            
            /* NCAA 三大事件顏色 */
            --color-made: #10b981;    /* 綠色：Made */
            --color-missed: #ef4444;  /* 紅色：Missed */
            --color-to: #f59e0b;      /* 黃色：Turnover */
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .subtitle {
            color: #38bdf8;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .container {
            display: flex;
            width: 1350px;
            max-width: 95vw;
            gap: 25px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-box {
            flex: 1.3;
            position: relative;
            padding-bottom: 41.3%;
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .analysis-box {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 620px;
        }

        /* NCAA 戰術快捷篩選按鈕區 */
        .filter-bar {
            display: flex;
            gap: 8px;
            background: #0f172a;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--court-line);
        }

        .filter-btn {
            flex: 1;
            background: #1e293b;
            border: 1px solid var(--court-line);
            color: #94a3b8;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .filter-btn:hover { background: #334155; color: #fff; }
        .filter-btn.active { background: #38bdf8; color: #0b0f19; font-weight: bold; border-color: #38bdf8; }

        .sub-layout {
            display: flex;
            gap: 15px;
            height: 100%;
            overflow: hidden;
        }

        .court {
            flex: 1;
            aspect-ratio: 15 / 14;
            border: 2px solid var(--court-line);
            border-top: none;
            position: relative;
            background-color: #0f172a;
            border-radius: 6px;
            overflow: hidden;
            height: fit-content;
        }

        .court::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 33.3%; height: 41.4%;
            border: 2px solid var(--court-line);
        }

        .three-point-line {
            position: absolute;
            top: -50%; left: 50%;
            transform: translateX(-50%);
            width: 90%; height: 135%;
            border: 2px solid var(--court-line);
            border-radius: 50%;
        }

        .shot-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            z-index: 10;
            opacity: 0.2;
        }

        .shot-dot.type-made { border: 2px solid var(--color-made); background: rgba(16, 185, 129, 0.1); }
        .shot-dot.type-missed { border: 2px solid var(--color-missed); background: rgba(239, 68, 68, 0.1); }
        .shot-dot.type-turnover { border: 2px solid var(--color-to); background: rgba(245, 158, 11, 0.1); }

        /* 當前播放高亮 */
        .shot-dot.active { opacity: 1; scale: 1.6; z-index: 20; }
        .shot-dot.type-made.active { background-color: var(--color-made); box-shadow: 0 0 20px var(--color-made); }
        .shot-dot.type-missed.active { background-color: var(--color-missed); box-shadow: 0 0 20px var(--color-missed); }
        .shot-dot.type-turnover.active { background-color: var(--color-to); box-shadow: 0 0 20px var(--color-to); }

        /* 篩選時被隱藏的點 */
        .shot-dot.filtered-out { display: none !important; }

        .playlist-box {
            flex: 1.3;
            background: #0f172a;
            border: 1px solid var(--court-line);
            border-radius: 6px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .play-item {
            padding: 10px 12px;
            background: #1e293b;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.15s ease;
            line-height: 1.4;
        }
        .play-item.filtered-out { display: none !important; }

        /* NCAA 戰術標籤樣式 */
        .play-type-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: #334155;
            color: #cbd5e1;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .play-item.type-made.active { background: #064e3b; border-left-color: var(--color-made); color: #fff; }
        .play-item.type-missed.active { background: #7f1d1d; border-left-color: var(--color-missed); color: #fff; }
        .play-item.type-turnover.active { background: #78350f; border-left-color: var(--color-to); color: #fff; }

        .meta-line { display: flex; justify-content: space-between; font-size: 0.75rem; color: #64748b; margin-top: 4px;}
        .stat-badge { font-weight: bold; }
        .stat-made { color: var(--color-made); }
        .stat-missed { color: var(--color-missed); }
        .stat-to { color: var(--color-to); }
    </style>
</head>
<body>

    <h1>HOOPS ANALYTICS MVP</h1>
    <div class="subtitle">Inspired by NCAA Synergy Scouting Workflow</div>

    <div class="container">
        <div class="video-box">
            <div id="player"></div>
        </div>

        <div class="analysis-box">
            
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterPlayType('all')">🔥 所有事件</button>
                <button class="filter-btn" onclick="filterPlayType('PnR')">🔄 擋拆 (PnR)</button>
                <button class="filter-btn" onclick="filterPlayType('Transition')">⚡ 快攻 (Transition)</button>
                <button class="filter-btn" onclick="filterPlayType('ISO')">👤 單打 (Isolation)</button>
            </div>
            
            <div class="sub-layout">
                <div class="court">
                    <div class="three-point-line"></div>
                    <div id="shot-map-container"></div>
                </div>
                
                <div class="playlist-box" id="playlist-container"></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const YOUR_YOUTUBE_VIDEO_ID = 'dQw4w9WgXcQ'; 

        // 📊 NCAA 級別結構化數據庫
        // playType 分類： 'PnR' (擋拆) | 'Transition' (快攻) | 'ISO' (單打)
        // type 分類： 'made' (入球) | 'missed' (射失) | 'turnover' (失誤)
        const shotData = [
            { id: 1,  playType: 'PnR',        type: 'made',     time: 40,   endTime: 55,   x: 25, y: 30, player: "#3 阿Ray", desc: "頂弧發動 PnR，吸住防守後妙傳左側 45 度空位三分命中。" },
            { id: 2,  playType: 'PnR',        type: 'missed',   time: 129,  endTime: 144,  x: 50, y: 45, player: "#11 隊長", desc: "PnR 擋拆後彈出（Pick & Pop），頂弧大空檔三分彈框而出。" },
            { id: 3,  playType: 'PnR',        type: 'turnover', time: 210,  endTime: 225,  x: 52, y: 55, player: "#3 阿Ray", desc: "中路 PnR 突破試圖給 Pocket Pass 傳給下順中鋒，被對方看穿截走。" },
            { id: 4,  playType: 'Transition', type: 'made',     time: 315,  endTime: 330,  x: 80, y: 20, player: "#7 魚仔", desc: "後場成功逼搶，前場 3 傳 2 快攻，右側 45 度 Transition 三分進。" },
            { id: 5,  playType: 'ISO',        type: 'turnover', time: 420,  endTime: 435,  x: 15, y: 80, player: "#23 肥波", desc: "左側低位拉開 ISO 單打，轉身發力時被吹進攻犯規。" },
            { id: 6,  playType: 'ISO',        type: 'missed',   time: 507,  endTime: 522,  x: 50, y: 85, player: "#23 肥波", desc: "底線強行 ISO 突破，踩入禁區轉身 Fadeaway 擦板力道太重射失。" },
            { id: 7,  playType: 'Transition', type: 'made',     time: 740,  endTime: 755,  x: 15, y: 80, player: "#11 隊長", desc: "守轉攻快速推動，左側底角美妙走位接球即射（Catch & Shoot）三分入網。" },
            { id: 8,  playType: 'Transition', type: 'turnover', time: 850,  endTime: 905,  x: 50, y: 25, player: "#10 占士", desc: "快攻反擊時試圖長傳前場，力度過大直接飛出底線。" },
            { id: 9,  playType: 'ISO',        type: 'missed',   time: 1100, endTime: 1115, x: 75, y: 50, player: "#3 阿Ray", desc: "右側 45 度拉開外線 ISO 急停跳投，受到干擾射失。" },
            { id: 10, playType: 'PnR',        type: 'made',     time: 1345, endTime: 1360, x: 52, y: 75, player: "#0 勁哥", desc: "PnR 擋拆後中鋒強硬下順，接球直奔籃下強推補籃得分。" }
        ];

        let player;
        let timerInterval;
        let currentFilter = 'all';

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: YOUR_YOUTUBE_VIDEO_ID,
                playerVars: { 'playsinline': 1, 'rel': 0, 'modestbranding': 1 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) { renderUI(); }
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) { startTracking(); } else { stopTracking(); }
        }

        function startTracking() {
            timerInterval = setInterval(() => {
                if (!player || !player.getCurrentTime) return;
                const currentTime = player.getCurrentTime();
                checkTimecodeSync(currentTime);
            }, 300);
        }
        function stopTracking() { clearInterval(timerInterval); }

        function checkTimecodeSync(currentTime) {
            shotData.forEach(shot => {
                // 如果該戰術被篩選隱藏了，就不觸發亮燈
                if (currentFilter !== 'all' && shot.playType !== currentFilter) return;

                const dot = document.getElementById(`dot-${shot.id}`);
                const listItem = document.getElementById(`item-${shot.id}`);

                if (currentTime >= shot.time && currentTime <= shot.endTime) {
                    if (!dot.classList.contains('active')) {
                        document.querySelectorAll('.shot-dot').forEach(d => d.classList.remove('active'));
                        document.querySelectorAll('.play-item').forEach(i => i.classList.remove('active'));

                        dot.classList.add('active');
                        listItem.classList.add('active');
                        listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            });
        }

        // 🎯 NCAA 核心功能：按戰術類型進行篩選
        function filterPlayType(type) {
            currentFilter = type;
            
            // 切換按鈕樣式
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 熄滅所有正在亮的燈
            document.querySelectorAll('.shot-dot').forEach(d => d.classList.remove('active'));
            document.querySelectorAll('.play-item').forEach(i => i.classList.remove('active'));

            // 隱藏/顯示 相應的數據點和清單
            shotData.forEach(shot => {
                const dot = document.getElementById(`dot-${shot.id}`);
                const listItem = document.getElementById(`item-${shot.id}`);
                
                if (type === 'all' || shot.playType === type) {
                    dot.classList.remove('filtered-out');
                    listItem.classList.remove('filtered-out');
                } else {
                    dot.classList.add('filtered-out');
                    listItem.classList.add('filtered-out');
                }
            });
        }

        function renderUI() {
            const courtContainer = document.getElementById('shot-map-container');
            const listContainer = document.getElementById('playlist-container');
            
            shotData.forEach(shot => {
                // 1. 渲染球場點
                const dot = document.createElement('div');
                dot.className = `shot-dot type-${shot.type}`;
                dot.style.left = `${shot.x}%`;
                dot.style.top = `${shot.y}%`;
                dot.id = `dot-${shot.id}`;

                // 2. 渲染結構化清單
                const listItem = document.createElement('div');
                listItem.className = `play-item type-${shot.type}`;
                listItem.id = `item-${shot.id}`;
                
                // 轉化成 NCAA 格式的標籤與文字
                let typeName = shot.playType === 'PnR' ? '🔄 PICK & ROLL' : shot.playType === 'Transition' ? '⚡ TRANSITION' : '👤 ISOLATION';
                let resultClass = shot.type === 'made' ? 'stat-made' : shot.type === 'missed' ? 'stat-missed' : 'stat-to';
                let resultName = shot.type === 'made' ? 'MADE' : shot.type === 'missed' ? 'MISSED' : 'TURNOVER';

                listItem.innerHTML = `
                    <div class="play-type-tag">${typeName}</div>
                    <div>${shot.desc}</div>
                    <div class="meta-line">
                        <span>執行球員: <strong>${shot.player}</strong></span>
                        <span class="stat-badge ${resultClass}">${resultName}</span>
                    </div>
                `;

                const manualTrigger = () => {
                    player.seekTo(shot.time, true);
                    player.playVideo();
                };

                dot.addEventListener('click', manualTrigger);
                listItem.addEventListener('click', manualTrigger);

                courtContainer.appendChild(dot);
                listContainer.appendChild(listItem);
            });
        }
    </script>
</body>
</html>
